services:
  db:
    image: postgres:16-alpine
    container_name: provena_db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-provena_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - provena_network
  backend:
    build:
      context: ./provena-backend
      dockerfile: Dockerfile
    container_name: provena_backend
    env_file: .env
    dns:
    - 8.8.8.8
    - 8.8.4.4
    command: sh -c "python manage.py migrate && gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      POSTGRES_DB: ${POSTGRES_DB:-provena_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:9000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./provena-backend:/app
    networks:
      - provena_network
  frontend:
    build:
      context: ./quasar-provena
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8000
    container_name: provena_frontend
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./quasar-provena:/app
      - /app/node_modules
    networks:
      - provena_network
volumes:
  postgres_data:
networks:
  provena_network:
    driver: bridge

